<!DOCTYPE html>
<html>
<head>
  <title>Dhruv & Maya Wedding RSVP</title>
  <style>
    body{
      font-family: Georgia, serif;
      background:#fdf6f0;
      padding:40px;
      text-align:center;
    }
    .container{
      max-width:600px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    h1{
      margin-bottom:20px;
    }
    input,select,textarea{
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:20px;
      border-radius:5px;
      border:1px solid #ccc;
    }
    button{
      background:#c89b3c;
      color:white;
      border:none;
      padding:12px 20px;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
    }
    button:hover{
      background:#b8862c;
    }
    #status{
      font-weight:bold;
      color:green;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dhruv & Maya Wedding RSVP</h1>

    <!-- Hidden iframe to prevent page reload -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <!-- Form submits directly to Google Apps Script -->
    <form id="rsvpForm" action="https://script.google.com/macros/s/AKfycbwjvp37GEOnTwACQiKsVLu7n9FvHBuF1J7ppyHZRsuYyvw2kVuNZJWuV9ydvi8eAZtnxw/exec"
          method="POST" target="hidden_iframe" onsubmit="submitted=true;">

      <input type="text" name="name" placeholder="Full Name" required>

      <select name="party" required>
        <option value="">Party Size</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
        <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
      </select>

      <input type="email" name="email" placeholder="Email Address" required>

      <textarea name="address" placeholder="Postal Address"></textarea>

      <select name="accommodation">
        <option value="">Accommodation</option>
        <option>Opt In</option>
        <option>I prefer to make my own accommodation arrangements</option>
      </select>

      <textarea name="notes" placeholder="Notes / Special Requests / Requirements"></textarea>

      <button type="submit">Submit RSVP</button>
    </form>

    <p id="status"></p>
  </div>

  <script>
    // Show "Thank you" message when form is submitted
    let submitted = false;
    document.getElementById("hidden_iframe").onload = function() {
      if(submitted){
        document.getElementById("status").innerText = "Thank you! Your RSVP has been submitted.";
        document.getElementById("rsvpForm").reset();
        submitted = false;
      }
    };
  </script>
</body>
</html>
