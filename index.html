<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhruv & Maya Wedding</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* --------- General Styles --------- */
body, html {
  margin:0; padding:0;
  font-family: Georgia, serif;
  background: url('images/kerala-backdrop.jpeg') no-repeat center center/cover;
  min-height:100vh;
  overflow-x:hidden;
  color:#fff;
}

.hidden { display:none; }

/* --------- Tabs --------- */
nav { display:flex; justify-content:center; gap:2rem; margin-top:20px; }
nav button { padding:0.5rem 1rem; font-weight:bold; border-radius:8px; border:none; cursor:pointer; background: rgba(0,0,0,0.3); transition: all 0.3s;}
nav button.active { background: rgba(255,255,255,0.3); color:#000; }

/* --------- Homepage Lotus Animation --------- */
.lotus-container { position:relative; width:300px; height:300px; margin:60px auto; }
.lotus-petal {
  position:absolute; width:60px; height:120px; background: rgba(255,255,255,0.8);
  border-radius:50% 50% 0 0; transform-origin: bottom center; bottom:0; left:50%;
  opacity:0; transform: rotate(0deg) scale(0);
  animation: openPetal 1s forwards;
}
.lotus-petal:nth-child(1) { transform: rotate(-40deg) scale(0); animation-delay:0.1s; }
.lotus-petal:nth-child(2) { transform: rotate(-20deg) scale(0); animation-delay:0.2s; }
.lotus-petal:nth-child(3) { transform: rotate(0deg) scale(0); animation-delay:0.3s; }
.lotus-petal:nth-child(4) { transform: rotate(20deg) scale(0); animation-delay:0.4s; }
.lotus-petal:nth-child(5) { transform: rotate(40deg) scale(0); animation-delay:0.5s; }

@keyframes openPetal {
  0% { transform: scale(0) rotate(0deg); opacity:0; }
  100% { transform: scale(1) rotate(var(--rot)); opacity:1; }
}

.lotus-text { text-align:center; margin-top:20px; font-size:2rem; opacity:0; animation: fadeIn 2s forwards 1s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* --------- Tab Pages --------- */
.tab-content { max-width:700px; margin:40px auto; padding:20px; background: rgba(0,0,0,0.5); border-radius:12px; }

/* --------- Wardrobe Image Uploads --------- */
.event-section { margin-bottom:30px; }
.event-section input[type=file] { margin-top:10px; display:block; }
</style>
</head>
<body>

<!-- --------- Tabs --------- -->
<nav>
  <button class="tab-btn active" data-tab="home">Home</button>
  <button class="tab-btn" data-tab="rsvp">RSVP</button>
  <button class="tab-btn" data-tab="address">Address & Location</button>
  <button class="tab-btn" data-tab="wardrobe">Wardrobe Planner</button>
</nav>

<!-- --------- Home --------- -->
<div id="home" class="tab-content relative overflow-hidden">
  <!-- Background fade + zoom -->
  <div class="absolute inset-0 bg-black/40 z-0 animate-bg-fade"></div>
  <img src="images/kerala-backdrop.jpeg" class="absolute inset-0 w-full h-full object-cover z-[-1] animate-bg-zoom" alt="Background">

  <!-- Lotus Container -->
  <div class="lotus-container relative z-10" style="width:350px;height:350px;margin:80px auto;">
    <!-- Glow behind lotus -->
    <div class="lotus-glow absolute inset-0 rounded-full" style="background: radial-gradient(circle,#ffd70055,#ff8c0055); filter:blur(30px); opacity:0; animation: glowPulse 3s ease-in-out infinite alternate;"></div>

    <!-- Petals -->
    <div class="lotus-petal" style="--rot:-50deg; animation-delay:0.2s;"></div>
    <div class="lotus-petal" style="--rot:-25deg; animation-delay:0.4s;"></div>
    <div class="lotus-petal" style="--rot:0deg; animation-delay:0.6s;"></div>
    <div class="lotus-petal" style="--rot:25deg; animation-delay:0.8s;"></div>
    <div class="lotus-petal" style="--rot:50deg; animation-delay:1s;"></div>
  </div>

  <!-- Names & Text -->
  <div class="lotus-text text-center text-white z-10 opacity-0 animate-text-fade mt-6">
    <h1 class="text-4xl font-bold">Dhruv & Maya</h1>
    <p class="text-lg mt-2">Welcome to our wedding</p>
  </div>
</div>

<style>
/* ---- Lotus Animation ---- */
.lotus-container { position: relative; }
.lotus-petal {
  position:absolute; width:70px; height:140px; background: rgba(255,255,255,0.8);
  border-radius:50% 50% 0 0; transform-origin: bottom center; bottom:0; left:50%;
  opacity:0; transform: scale(0) rotate(0deg);
  animation: openPetal 1s forwards;
}
@keyframes openPetal {
  0% { transform: scale(0) rotate(0deg); opacity:0; }
  100% { transform: scale(1) rotate(var(--rot)); opacity:1; }
}

/* ---- Glow Animation ---- */
@keyframes glowPulse {
  0% { opacity:0.3; transform: scale(1); }
  50% { opacity:0.6; transform: scale(1.1); }
  100% { opacity:0.3; transform: scale(1); }
}

/* ---- Text Animation ---- */
@keyframes textFadeUp {
  0% { opacity:0; transform: translateY(20px); }
  100% { opacity:1; transform: translateY(0); }
}
.animate-text-fade { animation: textFadeUp 2s forwards 1.5s; }

/* ---- Background Fade + Zoom ---- */
@keyframes bgFade {
  0% { opacity:0; }
  100% { opacity:1; }
}
.animate-bg-fade { animation: bgFade 2s forwards; }

@keyframes bgZoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.05); }
}
.animate-bg-zoom { animation: bgZoom 20s ease-in-out infinite alternate; }
</style>

<!-- --------- RSVP --------- -->
<div id="rsvp" class="tab-content hidden">
  <h2>RSVP</h2>
  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
  <form id="rsvpForm"
        action="https://script.google.com/macros/s/AKfycbx6SZiCJvsbVCMnOR5e2Pb-BVVHqf0OhmJ8kHLH8Emfxa8SeTpOAR5SqEZF_ND2i1lZwg/exec"
        method="POST"
        target="hidden_iframe"
        onsubmit="submitted=true;">
    <input type="text" name="name" placeholder="Full Name" required>
    <select name="party">
      <option value="">Plus 1?</option>
      <option>Yes</option>
      <option>No</option>
    </select>
    <input type="email" name="email" placeholder="Email Address" required>
    <textarea name="notes" placeholder="Notes / Special Requests"></textarea>
    <button type="submit">Submit RSVP</button>
  </form>
  <p id="status"></p>
</div>

<!-- --------- Address & Location --------- -->
<div id="address" class="tab-content hidden">
  <h2>Address & Location</h2>
  <iframe src="YOUR_GOOGLE_MAP_EMBED_URL" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
  <p>Hotel Details: <br>Hotel Name, Address, Contact Info, Booking Link</p>
</div>

<!-- --------- Wardrobe Planner --------- -->
<div id="wardrobe" class="tab-content hidden">
  <h2>Wardrobe Planner</h2>

  <div class="event-section">
    <h3>Event 1: Mehendi</h3>
    <input type="file" accept="image/*">
    <input type="file" accept="image/*">
  </div>

  <div class="event-section">
    <h3>Event 2: Sangeet</h3>
    <input type="file" accept="image/*">
    <input type="file" accept="image/*">
  </div>

  <div class="event-section">
    <h3>Event 3: Wedding</h3>
    <input type="file" accept="image/*">
    <input type="file" accept="image/*">
  </div>
</div>

<script>
// --------- Tab Switching ---------
const tabs = document.querySelectorAll('.tab-btn');
const pages = document.querySelectorAll('.tab-content');
tabs.forEach(tab => {
  tab.addEventListener('click', ()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    pages.forEach(p=>p.classList.add('hidden'));
    document.getElementById(tab.dataset.tab).classList.remove('hidden');
  });
});

// --------- RSVP Form Submission ---------
let submitted=false;
document.getElementById("hidden_iframe").onload = function(){
  if(submitted){
    document.getElementById("status").innerText="Thank you! Your RSVP has been submitted.";
    document.getElementById("rsvpForm").reset();
    submitted=false;
  }
};
</script>
</body>
</html>
